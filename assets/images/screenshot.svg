<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09111F"/>
      <stop offset="1" stop-color="#101B33"/>
    </linearGradient>
    <linearGradient id="heroGlow" x1="240" y1="160" x2="1320" y2="880" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4F46E5" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#1B2740"/>
      <stop offset="1" stop-color="#121C31"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="softBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="32"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="260" cy="180" r="190" fill="#334155" fill-opacity="0.35" filter="url(#softBlur)"/>
  <circle cx="1320" cy="780" r="230" fill="#0EA5E9" fill-opacity="0.18" filter="url(#softBlur)"/>
  <circle cx="1180" cy="210" r="160" fill="#4F46E5" fill-opacity="0.25" filter="url(#softBlur)"/>

  <g filter="url(#shadow)">
    <rect x="110" y="80" width="1380" height="840" rx="34" fill="#0F172A" stroke="#24314F" stroke-width="2"/>
    <rect x="110" y="80" width="1380" height="64" rx="34" fill="#111B2F"/>
    <circle cx="158" cy="112" r="8" fill="#F87171"/>
    <circle cx="188" cy="112" r="8" fill="#FBBF24"/>
    <circle cx="218" cy="112" r="8" fill="#34D399"/>
    <rect x="320" y="98" width="960" height="28" rx="14" fill="#18253F"/>
    <text x="800" y="117" fill="#8EA0C5" font-family="Inter, Arial, sans-serif" font-size="16" text-anchor="middle">ProTeam Website UI</text>

    <rect x="150" y="160" width="1300" height="700" rx="28" fill="url(#bg)"/>
    <circle cx="1160" cy="280" r="250" fill="url(#heroGlow)" fill-opacity="0.3" filter="url(#softBlur)"/>

    <text x="210" y="232" fill="#93C5FD" font-family="Inter, Arial, sans-serif" font-size="18" letter-spacing="2">PROTEAM</text>
    <text x="210" y="332" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="700">Production-ready SaaS UI</text>
    <text x="210" y="384" fill="#B7C3DD" font-family="Inter, Arial, sans-serif" font-size="24">Modern, modular, and responsive landing page experience.</text>

    <rect x="210" y="438" width="180" height="56" rx="18" fill="#4F46E5"/>
    <text x="300" y="474" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" text-anchor="middle">Get Started</text>
    <rect x="406" y="438" width="180" height="56" rx="18" fill="#1E293B" stroke="#334155" stroke-width="1.5"/>
    <text x="496" y="474" fill="#D9E2F2" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" text-anchor="middle">View Pricing</text>

    <g transform="translate(860 220)">
      <rect x="0" y="0" width="410" height="300" rx="28" fill="#0F172A" stroke="#24314F" stroke-width="2"/>
      <rect x="24" y="24" width="362" height="58" rx="18" fill="#18253F"/>
      <rect x="24" y="100" width="164" height="76" rx="20" fill="url(#card)"/>
      <rect x="202" y="100" width="184" height="76" rx="20" fill="url(#card)"/>
      <rect x="24" y="192" width="362" height="82" rx="22" fill="url(#card)"/>
      <circle cx="62" cy="53" r="14" fill="#4F46E5"/>
      <circle cx="102" cy="53" r="14" fill="#22D3EE"/>
      <circle cx="142" cy="53" r="14" fill="#10B981"/>
      <text x="58" y="143" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">$29</text>
      <text x="58" y="168" fill="#93C5FD" font-family="Inter, Arial, sans-serif" font-size="15">Starter / mo</text>
      <text x="236" y="143" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">$79</text>
      <text x="236" y="168" fill="#93C5FD" font-family="Inter, Arial, sans-serif" font-size="15">Pro / mo</text>
      <text x="50" y="242" fill="#D6E1F2" font-family="Inter, Arial, sans-serif" font-size="18">Monthly and yearly pricing toggle</text>
    </g>

    <g transform="translate(210 566)">
      <rect x="0" y="0" width="520" height="168" rx="24" fill="url(#card)" stroke="#2B3956" stroke-width="1.5"/>
      <circle cx="66" cy="84" r="40" fill="#1D4ED8"/>
      <circle cx="66" cy="84" r="26" fill="#93C5FD"/>
      <text x="130" y="72" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Clean component structure</text>
      <text x="130" y="108" fill="#B7C3DD" font-family="Inter, Arial, sans-serif" font-size="18">Hero, about, services, team, pricing, contact.</text>
    </g>

    <g transform="translate(760 566)">
      <rect x="0" y="0" width="510" height="168" rx="24" fill="url(#card)" stroke="#2B3956" stroke-width="1.5"/>
      <rect x="36" y="38" width="438" height="18" rx="9" fill="#22314F"/>
      <rect x="36" y="38" width="280" height="18" rx="9" fill="#22D3EE"/>
      <rect x="36" y="76" width="438" height="18" rx="9" fill="#22314F"/>
      <rect x="36" y="114" width="320" height="18" rx="9" fill="#22314F"/>
      <circle cx="414" cy="117" r="24" fill="#4F46E5"/>
      <path d="M404 117H424" stroke="white" stroke-width="4" stroke-linecap="round"/>
      <path d="M414 107V127" stroke="white" stroke-width="4" stroke-linecap="round"/>
      <text x="36" y="152" fill="#D6E1F2" font-family="Inter, Arial, sans-serif" font-size="18">Built for a premium first impression</text>
    </g>

    <rect x="150" y="792" width="1300" height="46" rx="16" fill="#111B2F"/>
    <text x="800" y="821" fill="#8EA0C5" font-family="Inter, Arial, sans-serif" font-size="16" text-anchor="middle">Landing page sections loaded from reusable HTML components</text>
  </g>
