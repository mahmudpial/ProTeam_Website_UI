<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProTeam | Production-Level SaaS UI</title>

    <!-- Frameworks & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Custom Production Styles -->
    <link rel="stylesheet" href="assets/css/style.css" />

    <style>
      /* Prevents content flashing before JS loads */
      [id$="-placeholder"] {
        min-height: 100px;
      }
      .loading-screen {
        position: fixed;
        inset: 0;
        background: #0f172a;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
    </style>
  </head>
  <body class="mesh-gradient text-slate-200 antialiased">
    <!-- Optional Loading Spinner -->
    <div id="loader" class="loading-screen">
      <div
        class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-indigo-500"
      ></div>
    </div>

    <!-- 1. Navigation Shell -->
    <div id="navbar-placeholder"></div>

    <!-- 2. Main Content Sections -->
    <main>
      <div id="hero-placeholder"></div>
      <div id="about-placeholder"></div>
      <div id="services-placeholder"></div>
      <div id="team-placeholder"></div>
      <div id="pricing-placeholder"></div>
      <div id="contact-placeholder"></div>
    </main>

    <!-- 3. Footer Shell -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="assets/js/main.js"></script>

    <script>
      /**
       * Component Bootstrapper
       * Synchronizes IDs to Navbar links (#hero, #about, etc.)
       */
      const components = [
        { id: "navbar-placeholder", path: "components/navbar.html" },
        { id: "hero-placeholder", path: "components/hero.html" },
        { id: "about-placeholder", path: "components/about.html" },
        { id: "services-placeholder", path: "components/services.html" },
        { id: "team-placeholder", path: "components/team.html" },
        { id: "pricing-placeholder", path: "components/pricing.html" },
        { id: "contact-placeholder", path: "components/contact.html" },
        { id: "footer-placeholder", path: "components/footer.html" },
      ];

      async function bootstrapApp() {
        try {
          // Load all components concurrently for speed
          const loadTasks = components.map(async (comp) => {
            const response = await fetch(comp.path);
            if (!response.ok) throw new Error(`Failed to load ${comp.path}`);
            const html = await response.text();
            document.getElementById(comp.id).innerHTML = html;
          });

          await Promise.all(loadTasks);

          // Initialize UI Logic once all DOM elements exist
          if (typeof ProUI !== "undefined") {
            ProUI.init();
          }

          // Hide Loader
          const loader = document.getElementById("loader");
          loader.style.opacity = "0";
          setTimeout(() => (loader.style.display = "none"), 500);
        } catch (err) {
          console.error("Critical UI Load Error:", err);
        }
      }

      // Execute on load
      document.addEventListener("DOMContentLoaded", bootstrapApp);
    </script>
  </body>
</html>
