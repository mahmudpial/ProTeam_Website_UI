<!-- Contact Section Module -->
<section id="contact" class="py-24 relative overflow-hidden">
  <!-- Decorative Glow -->
  <div
    class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-indigo-600/10 blur-[120px] rounded-full -z-10"
  ></div>

  <div class="max-w-7xl mx-auto px-6 lg:px-8">
    <div
      class="reveal bg-[#0f172a]/50 backdrop-blur-xl rounded-[3rem] overflow-hidden border border-white/5 shadow-2xl flex flex-col lg:row"
    >
      <div class="flex flex-col lg:flex-row w-full">
        <!-- Contact Info Sidebar -->
        <div
          class="lg:w-1/3 bg-gradient-to-br from-indigo-600 to-indigo-800 p-12 text-white relative"
        >
          <!-- Pattern Overlay -->
          <div
            class="absolute inset-0 opacity-10 pointer-events-none bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"
          ></div>

          <div class="relative z-10">
            <h2 class="text-4xl font-black mb-6 tracking-tight">
              Get in <span class="text-indigo-200">Touch.</span>
            </h2>
            <p class="text-indigo-100/80 text-lg mb-12 leading-relaxed">
              Ready to automate your team? Our architects are standing by to
              help you integrate.
            </p>

            <div class="space-y-8">
              <div class="group flex items-center space-x-5">
                <div
                  class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center border border-white/20 group-hover:scale-110 transition-transform"
                >
                  <i class="fas fa-envelope text-indigo-100"></i>
                </div>
                <div>
                  <p
                    class="text-xs font-bold uppercase tracking-widest text-indigo-300 mb-1"
                  >
                    Email us
                  </p>
                  <span class="font-medium">hello@proteam.com</span>
                </div>
              </div>

              <div class="group flex items-center space-x-5">
                <div
                  class="w-12 h-12 bg-white/10 rounded-2xl flex items-center justify-center border border-white/20 group-hover:scale-110 transition-transform"
                >
                  <i class="fas fa-phone text-indigo-100"></i>
                </div>
                <div>
                  <p
                    class="text-xs font-bold uppercase tracking-widest text-indigo-300 mb-1"
                  >
                    Call us
                  </p>
                  <span class="font-medium">+1 (555) 000-0000</span>
                </div>
              </div>
            </div>

            <!-- Social Links -->
            <div class="mt-16 pt-8 border-t border-white/10 flex gap-4">
              <a href="#" class="text-white/60 hover:text-white transition"
                ><i class="fab fa-twitter"></i
              ></a>
              <a href="#" class="text-white/60 hover:text-white transition"
                ><i class="fab fa-linkedin"></i
              ></a>
              <a href="#" class="text-white/60 hover:text-white transition"
                ><i class="fab fa-github"></i
              ></a>
            </div>
          </div>
        </div>

        <!-- Contact Form -->
        <div class="lg:w-2/3 p-12 lg:p-16">
          <form action="#" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="reveal" style="transition-delay: 100ms">
              <label
                class="block text-xs font-black uppercase tracking-widest text-slate-500 mb-3 ml-1"
                >Full Name</label
              >
              <input
                type="text"
                class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-5 text-white placeholder:text-slate-600 outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all"
                placeholder="John Doe"
              />
            </div>
            <div class="reveal" style="transition-delay: 200ms">
              <label
                class="block text-xs font-black uppercase tracking-widest text-slate-500 mb-3 ml-1"
                >Work Email</label
              >
              <input
                type="email"
                class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-5 text-white placeholder:text-slate-600 outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all"
                placeholder="john@company.com"
              />
            </div>
            <div class="md:col-span-2 reveal" style="transition-delay: 300ms">
              <label
                class="block text-xs font-black uppercase tracking-widest text-slate-500 mb-3 ml-1"
                >Message</label
              >
              <textarea
                rows="5"
                class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-5 text-white placeholder:text-slate-600 outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all resize-none"
                placeholder="Describe your team's needs..."
              ></textarea>
            </div>
            <button
              type="submit"
              class="md:col-span-2 group relative overflow-hidden bg-indigo-600 text-white font-bold py-5 rounded-2xl transition-all active:scale-[0.98] shadow-xl shadow-indigo-600/20"
            >
              <div
                class="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform duration-300"
              ></div>
              <span class="relative flex items-center justify-center gap-2">
                Deploy Message <i class="fas fa-paper-plane text-xs"></i>
              </span>
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
