<!-- Hero Section -->
<section id="hero" class="relative pt-32 pb-20 overflow-hidden">
  <!-- Dynamic Background Architecture -->
  <div class="absolute inset-0 -z-10">
    <!-- Base dark layer -->
    <div class="absolute inset-0 bg-[#020617]"></div>
    <!-- Grid Overlay -->
    <div
      class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-[0.03]"
    ></div>
    <!-- Radial Glows -->
    <div
      class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-indigo-600/20 rounded-full blur-[120px] animate-pulse"
    ></div>
    <div
      class="absolute bottom-[10%] right-[-5%] w-[40%] h-[40%] bg-purple-600/10 rounded-full blur-[100px]"
    ></div>
  </div>

  <div class="max-w-7xl mx-auto px-6 lg:px-8">
    <div class="flex flex-col lg:flex-row items-center gap-20">
      <!-- Content Column -->
      <div class="flex-1 text-center lg:text-left reveal">
        <!-- New Release Badge -->
        <div
          class="inline-flex items-center gap-3 px-4 py-2 rounded-full bg-white/5 border border-white/10 mb-8 backdrop-blur-md"
        >
          <span class="relative flex h-2 w-2">
            <span
              class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"
            ></span>
            <span
              class="relative inline-flex rounded-full h-2 w-2 bg-indigo-500"
            ></span>
          </span>
          <span
            class="text-[10px] font-black text-indigo-300 uppercase tracking-[0.2em]"
            >v3.0 Engine is Live</span
          >
        </div>

        <h1
          class="text-6xl md:text-8xl font-black text-white leading-[0.95] mb-8 tracking-tighter"
        >
          Engineering <br />
          <span
            class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-purple-400 to-indigo-400 bg-[length:200%_auto] animate-gradient"
            >Dream Teams.</span
          >
        </h1>

        <p
          class="text-xl text-slate-400 mb-12 max-w-2xl mx-auto lg:mx-0 leading-relaxed font-medium"
        >
          The intelligence layer to manage, scale, and optimize your global
          workforce. Built for developers, designed for leaders.
        </p>

        <div
          class="flex flex-col sm:flex-row items-center justify-center lg:justify-start gap-5"
        >
          <button
            class="w-full sm:w-auto px-10 py-5 bg-indigo-600 text-white font-bold rounded-2xl hover:bg-indigo-500 hover:shadow-[0_0_30px_rgba(79,70,229,0.4)] transition-all active:scale-95 flex items-center justify-center gap-3 group"
          >
            Get Started Now
            <i
              class="fas fa-arrow-right text-sm group-hover:translate-x-1 transition-transform"
            ></i>
          </button>

          <button
            class="w-full sm:w-auto px-10 py-5 bg-white/5 text-white font-bold rounded-2xl border border-white/10 hover:bg-white/10 transition-all flex items-center justify-center gap-3 backdrop-blur-sm"
          >
            <i class="fas fa-play-circle text-indigo-400 text-xl"></i>
            Watch System Demo
          </button>
        </div>

        <!-- Trust Badge -->
        <div class="mt-16 pt-10 border-t border-white/5">
          <p
            class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em] mb-6"
          >
            Powering Industry Giants
          </p>
          <div
            class="flex flex-wrap justify-center lg:justify-start gap-10 opacity-30 grayscale invert"
          >
            <i class="fab fa-google text-2xl"></i>
            <i class="fab fa-amazon text-2xl"></i>
            <i class="fab fa-slack text-2xl"></i>
            <i class="fab fa-microsoft text-2xl"></i>
          </div>
        </div>
      </div>

      <!-- Visual Column (Glassmorphic Mockup) -->
      <div class="flex-1 relative reveal" style="transition-delay: 200ms">
        <div class="relative z-10 w-full animate-float">
          <!-- Abstract UI Card -->
          <div
            class="glass-card p-2 rounded-[2.5rem] border-white/10 shadow-[0_32px_64px_-16px_rgba(0,0,0,0.5)]"
          >
            <div
              class="bg-[#0f172a] rounded-[2rem] p-8 border border-white/5 relative overflow-hidden"
            >
              <!-- Inner Glow -->
              <div
                class="absolute -top-24 -right-24 w-48 h-48 bg-indigo-500/20 blur-[60px] rounded-full"
              ></div>

              <div class="flex items-center justify-between mb-10">
                <div class="flex gap-2.5">
                  <div
                    class="w-3.5 h-3.5 rounded-full bg-slate-800 border border-white/5"
                  ></div>
                  <div
                    class="w-3.5 h-3.5 rounded-full bg-slate-800 border border-white/5"
                  ></div>
                  <div
                    class="w-3.5 h-3.5 rounded-full bg-slate-800 border border-white/5"
                  ></div>
                </div>
                <div class="h-2 w-24 bg-slate-800 rounded-full"></div>
              </div>

              <div class="space-y-6">
                <div
                  class="h-10 w-full bg-gradient-to-r from-indigo-500/20 to-transparent rounded-xl border border-indigo-500/10"
                ></div>
                <div class="h-10 w-[70%] bg-slate-800/50 rounded-xl"></div>
                <div class="grid grid-cols-2 gap-4">
                  <div
                    class="h-28 bg-slate-800/30 rounded-2xl border border-white/5 flex items-center justify-center group"
                  >
                    <i
                      class="fas fa-project-diagram text-indigo-500/40 text-3xl group-hover:scale-110 transition-transform"
                    ></i>
                  </div>
                  <div
                    class="h-28 bg-indigo-600/10 rounded-2xl border border-indigo-500/20 flex items-center justify-center"
                  >
                    <i class="fas fa-bolt text-indigo-400 text-3xl"></i>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Background accent -->
        <div
          class="absolute -bottom-20 -left-20 w-80 h-80 bg-indigo-600 rounded-full mix-blend-screen filter blur-[120px] opacity-20"
        ></div>
      </div>
    </div>
  </div>
</section>
